<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title and page.title != 'Nexum' %}{{ page.title }} — Nexum{% else %}Nexum{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="{{ site.baseurl }}/" class="logo">NEXUM</a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/manifesto/" {% if page.url contains 'manifesto' %}class="active"{% endif %}>Манифест</a>
        <a href="{{ site.baseurl }}/protocols/" {% if page.url contains 'protocols' %}class="active"{% endif %}>Протоколы</a>
        <a href="{{ site.baseurl }}/initiation/" {% if page.url contains 'initiation' %}class="active"{% endif %}>Посвящение</a>
        <a href="{{ site.baseurl }}/signals/" {% if page.url contains 'signals' %}class="active"{% endif %}>Сигналы</a>
        <a href="{{ site.baseurl }}/nodes/" {% if page.url contains 'nodes' %}class="active"{% endif %}>Узлы</a>
        <a href="{{ site.baseurl }}/cognition/" {% if page.url contains 'cognition' %}class="active"{% endif %}>Когниция</a>
        <a href="{{ site.baseurl }}/labs/" {% if page.url contains 'labs' %}class="active"{% endif %}>Лаборатория</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <p>NEXUM &middot; протокол эволюции человека &middot; nexum.space</p>
  </footer>
</body>
</html>
